<script>
(function(){
  // Calculate site root: /sift/ for GH Pages, / for local
  var path = location.pathname;
  var root = path.indexOf('/sift/') === 0 ? '/sift/' : '/';
  // Resolve all data-link anchors
  document.querySelectorAll('[data-link]').forEach(function(a){
    var href = a.getAttribute('href');
    if(href) a.href = root + href;
  });
  // Expose root for fetch calls
  window.__sift_root = root;
})();
</script>
